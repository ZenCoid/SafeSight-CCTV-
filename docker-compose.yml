version: "3.8"

services:
  safesight:
    build: .
    container_name: safesight-cctv
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - ./weights:/app/weights:ro
      - ./violations:/app/violations
      - ./static:/app/static:ro
      - ./cameras.json:/app/cameras.json:ro
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"